<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cleaning Complete</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Orbitron:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>
<body class="dash-body">

<div class="dash-bg" aria-hidden="true"></div>

<div class="container py-5">
    <div class="dash-card dash-card--strong p-4">
        <div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mb-3">
            <div>
                <div class="dash-title h3 mb-1"><span class="dash-emoji emoji-bob" aria-hidden="true">✅</span>Processing Complete</div>
                <div class="dash-subtitle">Your dataset is ready to download.</div>
            </div>
            <div class="dash-kv">Rows: {{ rows }}</div>
        </div>

        <div class="dash-card p-3 mb-3" style="background: rgba(255,255,255,0.06);">
            <div class="dash-section-h mb-1">Audit Report</div>
            <div class="dash-kv">{{ note }}</div>
        </div>

        <div class="dash-section-h mb-2">Preview</div>
        <div class="table-responsive dash-table mb-4">
            {{ table | safe }}
        </div>

        <div class="d-grid gap-2 d-md-flex">
            <a href="/download/{{ clean_filename }}" class="btn btn-primary btn-lg"><span class="dash-emoji emoji-wiggle" aria-hidden="true">📥</span>Download CSV</a>
            <a href="/" class="btn btn-outline-light btn-lg">Start Over</a>
        </div>
    </div>
</div>

<script>
  (function () {
    const root = document.documentElement;
    let tx = 0.55;
    let ty = 0.35;
    let cx = tx;
    let cy = ty;

    function onMove(e) {
      const w = window.innerWidth || 1;
      const h = window.innerHeight || 1;
      tx = Math.min(1, Math.max(0, e.clientX / w));
      ty = Math.min(1, Math.max(0, e.clientY / h));
    }

    window.addEventListener('mousemove', onMove, { passive: true });

    function tick() {
      cx += (tx - cx) * 0.06;
      cy += (ty - cy) * 0.06;
      root.style.setProperty('--mx', cx.toFixed(4));
      root.style.setProperty('--my', cy.toFixed(4));
      requestAnimationFrame(tick);
    }

    requestAnimationFrame(tick);
  })();
</script>

</body>
</html>
