<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dataset Optimiser - Upload</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Orbitron:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>
<body class="dash-body">

    <div class="dash-bg" aria-hidden="true"></div>

    <div class="container py-5" style="min-height: 100vh; display: grid; place-items: center;">
        <div class="dash-card dash-card--strong p-4" style="max-width: 560px; width: 100%;">
          <div class="dash-title h3 mb-1"><span class="dash-emoji emoji-bob" aria-hidden="true">🧪</span>Dataset Optimiser</div>
            <div class="dash-subtitle mb-4">Upload a CSV to profile data quality and generate visual insights.</div>
            
            <form action="/upload" method="post" enctype="multipart/form-data">
                <div class="mb-3">
                    <label for="file" class="form-label fw-semibold" style="color: rgba(255,255,255,0.9);">CSV Dataset</label>
                    <input class="form-control" type="file" name="file" accept=".csv" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 btn-lg"><span class="dash-emoji emoji-pulse" aria-hidden="true">✨</span>Analyze Data</button>
            </form>
            
            <div class="mt-3">
                <small class="dash-kv">Dashboard, charts, cleaning & optimization included.</small>
            </div>
        </div>
    </div>

    <script>
      (function () {
        const root = document.documentElement;
        let tx = 0.55;
        let ty = 0.35;
        let cx = tx;
        let cy = ty;

        function onMove(e) {
          const w = window.innerWidth || 1;
          const h = window.innerHeight || 1;
          tx = Math.min(1, Math.max(0, e.clientX / w));
          ty = Math.min(1, Math.max(0, e.clientY / h));
        }

        window.addEventListener('mousemove', onMove, { passive: true });

        function tick() {
          cx += (tx - cx) * 0.06;
          cy += (ty - cy) * 0.06;
          root.style.setProperty('--mx', cx.toFixed(4));
          root.style.setProperty('--my', cy.toFixed(4));
          requestAnimationFrame(tick);
        }

        requestAnimationFrame(tick);
      })();
    </script>

</body>
</html>
